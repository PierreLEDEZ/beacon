name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  # Cancel older runs on the same ref so the latest push supersedes earlier ones.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (windows-latest)
    # Beacon is Windows-only (Win32 APIs, WebView2); no point matrix-building.
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type-check + build
        # tsc (via `build`) catches type regressions; Vite verifies the
        # bundle produces a dist/ that Tauri can embed.
        run: npm run build

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Rust tests
        working-directory: src-tauri
        # `cargo test` is a near-no-op today (we have no unit tests yet)
        # but having it gated in CI means future tests land with teeth.
        run: cargo test --all-targets
